<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Eraser, Crop & Pan Tool</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #2c2f33;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            /* Prevent full page scroll */
        }

        .toolbar {
            background-color: #23272a;
            padding: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            z-index: 10;
            flex-wrap: wrap;
        }

        .divider {
            width: 1px;
            height: 30px;
            background-color: #4f545c;
            margin: 0 5px;
        }

        button,
        input[type="file"],
        input[type="range"] {
            background-color: #7289da;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        button:hover {
            background-color: #5b6eae;
        }

        button.active {
            background-color: #f04747;
            font-weight: bold;
        }

        button:disabled {
            background-color: #4f545c;
            color: #b9bbbe;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .canvas-container {
            flex-grow: 1;
            overflow: hidden;
            /* Hide scrollbars for manual panning */
            position: relative;
            background-image:
                linear-gradient(45deg, #ccc 25%, transparent 25%),
                linear-gradient(135deg, #ccc 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(135deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 0, 10px -10px, 0px 10px;
            background-color: #eee;
        }

        .canvas-container.dark-bg {
            background-image:
                linear-gradient(45deg, #2c2f33 25%, transparent 25%),
                linear-gradient(135deg, #2c2f33 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #2c2f33 75%),
                linear-gradient(135deg, transparent 75%, #2c2f33 75%);
            background-color: #23272a;
        }

        .canvas-wrapper {
            position: absolute;
            left: 0;
            top: 0;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            transform-origin: top left;
        }

        canvas {
            image-rendering: pixelated;
            display: block;
        }

        #uiCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
        }

        #brushCursor {
            display: none;
            position: fixed;
            pointer-events: none;
            box-sizing: border-box;
            border: 1px solid white;
            box-shadow: 0 0 0 1px black, inset 0 0 0 1px black;
            z-index: 100;
        }
    </style>
</head>

<body>

    <div class="toolbar">
        <input type="file" id="imageLoader" accept="image/*">

        <div class="divider"></div>

        <button id="undoBtn" disabled title="Ctrl+Z or Cmd+Z">↩️</button>
        <button id="redoBtn" disabled title="Ctrl+Y or Cmd+Y">↪️</button>

        <div class="divider"></div>

        <button id="toolErase" class="active" title="Shortcut: E">✏️ Erase</button>
        <button id="toolCrop" title="Shortcut: C">✂️ Crop</button>
        <button id="toolPan" title="Shortcut: Spacebar or Middle-Click">✋ Pan</button>
        <button id="autoProcessBtn" style="background-color: #9b59b6;" title="Auto-remove white background & crop">✨ Auto</button>

        <div id="eraserControls">
            <label for="eraserSize">Size: <span id="sizeVal">5</span>px</label>
            <input type="range" id="eraserSize" min="1" max="50" value="5">
        </div>

        <div id="cropControls" style="display: none; align-items: center; gap: 10px;">
            <button id="applyCropBtn" style="background-color: #43b581;">✅ Apply</button>
            <button id="cancelCropBtn" style="background-color: #f04747;">❌ Cancel</button>
        </div>

        <div class="divider" style="margin-left: auto;"></div>

        <button id="toggleBgBtn" title="Toggle Dark Background">🌗 Dark BG</button>

        <button id="zoomIn">Zoom (+)</button>
        <button id="zoomOut">Zoom (-)</button>
        <button id="resetZoom">Reset</button>
        <button id="downloadBtn" style="background-color: #43b581;">Download</button>
    </div>

    <div class="canvas-container" id="container">
        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="canvas"></canvas>
            <canvas id="uiCanvas"></canvas>
        </div>
    </div>
    
    <div id="brushCursor"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const uiCanvas = document.getElementById('uiCanvas');
        const uiCtx = uiCanvas.getContext('2d');
        const canvasWrapper = document.getElementById('canvasWrapper');
        const container = document.getElementById('container');
        const brushCursor = document.getElementById('brushCursor');

        const imageLoader = document.getElementById('imageLoader');
        const eraserSizeSlider = document.getElementById('eraserSize');
        const sizeVal = document.getElementById('sizeVal');
        const undoBtn = document.getElementById('undoBtn');
        const redoBtn = document.getElementById('redoBtn');

        let currentScale = 1;
        let currentImage = null;
        let mode = 'erase'; // 'erase', 'crop', or 'pan'

        // Interaction states
        let isInteracting = false;
        let hasModifiedInCurrentStroke = false;
        let mousePos = { x: 0, y: 0 };

        // Crop states
        let cropStart = null;
        let cropRect = null; // {x, y, w, h}
        let cropDragMode = null; // 'draw', 'move', 'nw', etc.

        // Panning states
        let isPanning = false;
        let panStart = { x: 0, y: 0 };
        let panX = 0;
        let panY = 0;
        let spacebarPressed = false;

        // --- HISTORY SYSTEM (Undo/Redo) ---
        let history = [];
        let historyStep = -1;

        function saveState() {
            historyStep++;
            if (historyStep < history.length) {
                history.length = historyStep;
            }
            history.push(canvas.toDataURL());
            updateHistoryButtons();
        }

        function undo() {
            if (historyStep > 0) {
                historyStep--;
                restoreState();
            }
        }

        function redo() {
            if (historyStep < history.length - 1) {
                historyStep++;
                restoreState();
            }
        }

        function restoreState() {
            const img = new Image();
            img.onload = function () {
                setCanvasSize(img.width, img.height);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                updateZoom();
                renderUI();
                updateHistoryButtons();
            }
            img.src = history[historyStep];
        }

        function updateHistoryButtons() {
            undoBtn.disabled = historyStep <= 0;
            redoBtn.disabled = historyStep >= history.length - 1;
        }

        // --- KEYBOARD SHORTCUTS ---
        document.addEventListener('keydown', function (e) {
            // Undo / Redo
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'z' || e.key === 'Z') {
                    e.preventDefault();
                    if (e.shiftKey) redo();
                    else undo();
                } else if (e.key === 'y' || e.key === 'Y') {
                    e.preventDefault();
                    redo();
                }
            }

            // Spacebar Panning
            if (e.code === 'Space' && currentImage && !spacebarPressed) {
                e.preventDefault(); // Prevent page scroll
                spacebarPressed = true;
                updateCursor();
                updateBrushCursor();
            }
        });

        document.addEventListener('keyup', function (e) {
            if (e.code === 'Space') {
                e.preventDefault();
                spacebarPressed = false;
                isPanning = false;
                updateCursor();
                updateBrushCursor();
            }
        });

        undoBtn.addEventListener('click', undo);
        redoBtn.addEventListener('click', redo);


        // --- TOOL SWITCHING & CURSORS ---
        function updateCropControls() {
            document.getElementById('cropControls').style.display = (mode === 'crop' && cropRect) ? 'flex' : 'none';
        }

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('toolErase').classList.toggle('active', mode === 'erase');
            document.getElementById('toolCrop').classList.toggle('active', mode === 'crop');
            document.getElementById('toolPan').classList.toggle('active', mode === 'pan');
            document.getElementById('eraserControls').style.display = mode === 'erase' ? 'block' : 'none';
            updateCropControls();
            updateCursor();
            updateBrushCursor();
            renderUI();
        }

        document.getElementById('toolErase').addEventListener('click', () => setMode('erase'));
        document.getElementById('toolCrop').addEventListener('click', () => setMode('crop'));
        document.getElementById('toolPan').addEventListener('click', () => setMode('pan'));

        function updateCursor() {
            if (spacebarPressed || mode === 'pan') {
                container.style.cursor = isPanning ? 'grabbing' : 'grab';
                uiCanvas.style.cursor = isPanning ? 'grabbing' : 'grab';
            } else if (mode === 'erase') {
                container.style.cursor = 'none'; // Custom HTML brush
                uiCanvas.style.cursor = 'none';
            } else if (mode === 'crop') {
                container.style.cursor = 'crosshair';
                uiCanvas.style.cursor = 'crosshair';
            }
        }

        function updateBrushCursor() {
            if (!currentImage || mode !== 'erase' || isPanning || spacebarPressed) {
                brushCursor.style.display = 'none';
                return;
            }
            
            brushCursor.style.display = 'block';

            const size = parseInt(eraserSizeSlider.value);
            const rect = uiCanvas.getBoundingClientRect();
            
            // Map logical position back to screen coordinates
            const logicalX = mousePos.x - Math.floor(size / 2);
            const logicalY = mousePos.y - Math.floor(size / 2);
            
            const screenX = rect.left + logicalX * currentScale;
            const screenY = rect.top + logicalY * currentScale;
            const screenW = size * currentScale;
            
            brushCursor.style.left = `${screenX}px`;
            brushCursor.style.top = `${screenY}px`;
            brushCursor.style.width = `${screenW}px`;
            brushCursor.style.height = `${screenW}px`;
        }

        function centerCanvas() {
            if (!currentImage) return;
            panX = (container.clientWidth - canvas.width * currentScale) / 2;
            panY = (container.clientHeight - canvas.height * currentScale) / 2;
            updateZoom();
        }

        imageLoader.addEventListener('change', function (e) {
            const reader = new FileReader();
            reader.onload = function (event) {
                const img = new Image();
                img.onload = function () {
                    setCanvasSize(img.width, img.height);
                    ctx.drawImage(img, 0, 0);
                    currentImage = img;

                    history = [];
                    historyStep = -1;
                    saveState();
                    cropRect = null;
                    updateCropControls();

                    if (img.width < 100) currentScale = 5;
                    else currentScale = 1;

                    centerCanvas();
                    setMode('erase'); // Default back to erase
                }
                img.src = event.target.result;
            }
            if (e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        function setCanvasSize(w, h) {
            canvas.width = w; canvas.height = h;
            uiCanvas.width = w; uiCanvas.height = h;
        }

        function getMousePos(evt) {
            const rect = uiCanvas.getBoundingClientRect();
            return {
                x: Math.floor((evt.clientX - rect.left) * (uiCanvas.width / rect.width)),
                y: Math.floor((evt.clientY - rect.top) * (uiCanvas.height / rect.height))
            };
        }

        // --- DRAWING & ACTIONS ---
        function getCropHandles(rect) {
            return {
                nw: { x: rect.x, y: rect.y },
                n:  { x: rect.x + rect.w/2, y: rect.y },
                ne: { x: rect.x + rect.w, y: rect.y },
                e:  { x: rect.x + rect.w, y: rect.y + rect.h/2 },
                se: { x: rect.x + rect.w, y: rect.y + rect.h },
                s:  { x: rect.x + rect.w/2, y: rect.y + rect.h },
                sw: { x: rect.x, y: rect.y + rect.h },
                w:  { x: rect.x, y: rect.y + rect.h/2 }
            };
        }

        function renderUI() {
            uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);

            if ((mode === 'pan' || spacebarPressed) || isPanning) return;

            if (mode === 'crop') {
                let rectToDraw = null;
                if (cropDragMode === 'draw' && cropStart) {
                    const minX = Math.min(cropStart.x, mousePos.x);
                    const minY = Math.min(cropStart.y, mousePos.y);
                    const width = Math.abs(mousePos.x - cropStart.x);
                    const height = Math.abs(mousePos.y - cropStart.y);
                    rectToDraw = { x: minX, y: minY, w: width, h: height };
                } else if (cropRect) {
                    rectToDraw = cropRect;
                }

                if (rectToDraw) {
                    uiCtx.fillStyle = 'rgba(0,0,0,0.5)';
                    uiCtx.fillRect(0, 0, uiCanvas.width, uiCanvas.height);
                    uiCtx.clearRect(rectToDraw.x, rectToDraw.y, rectToDraw.w, rectToDraw.h);
                    uiCtx.strokeStyle = '#fff';
                    uiCtx.lineWidth = 1 / currentScale;
                    uiCtx.setLineDash([4 / currentScale, 4 / currentScale]);
                    uiCtx.strokeRect(rectToDraw.x, rectToDraw.y, rectToDraw.w, rectToDraw.h);
                    uiCtx.setLineDash([]);
                    
                    if (cropRect && cropDragMode !== 'draw') {
                        const hs = 8 / currentScale;
                        const handles = getCropHandles(cropRect);
                        uiCtx.fillStyle = 'white';
                        for (let key in handles) {
                            const p = handles[key];
                            uiCtx.fillRect(p.x - hs/2, p.y - hs/2, hs, hs);
                        }
                    }
                }
            }
        }

        function performErase() {
            const size = parseInt(eraserSizeSlider.value);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = "rgba(0,0,0,1)";
            ctx.fillRect(mousePos.x - Math.floor(size / 2), mousePos.y - Math.floor(size / 2), size, size);
            ctx.globalCompositeOperation = 'source-over';
            hasModifiedInCurrentStroke = true;
        }

        document.getElementById('applyCropBtn').addEventListener('click', () => {
            if (!cropRect) return;
            const minX = Math.floor(cropRect.x);
            const minY = Math.floor(cropRect.y);
            const w = Math.floor(cropRect.w);
            const h = Math.floor(cropRect.h);

            if (w <= 0 || h <= 0) return;

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = w;
            tempCanvas.height = h;
            tempCanvas.getContext('2d').drawImage(canvas, minX, minY, w, h, 0, 0, w, h);

            setCanvasSize(w, h);
            ctx.drawImage(tempCanvas, 0, 0);

            cropRect = null;
            updateCropControls();
            centerCanvas(); // recenter the cropped image
            saveState();
        });

        document.getElementById('cancelCropBtn').addEventListener('click', () => {
            cropRect = null;
            cropDragMode = null;
            updateCropControls();
            renderUI();
        });

        // --- MOUSE EVENTS ---
        container.addEventListener('mousedown', (e) => {
            if (!currentImage) return;

            if (mode === 'pan' || spacebarPressed || e.button === 1) {
                e.preventDefault();
                isPanning = true;
                panStart = { x: e.clientX, y: e.clientY };
                updateCursor();
                updateBrushCursor();
                return;
            }

            if (e.button === 0) {
                mousePos = getMousePos(e);
                
                if (mode === 'crop') {
                    if (cropRect) {
                        const hs = 12 / currentScale; // Slightly larger hit area for handles
                        const handles = getCropHandles(cropRect);
                        for (let key in handles) {
                            const p = handles[key];
                            if (Math.abs(mousePos.x - p.x) <= hs && Math.abs(mousePos.y - p.y) <= hs) {
                                cropDragMode = key;
                                isInteracting = true;
                                cropStart = { ...mousePos };
                                return;
                            }
                        }
                        
                        if (mousePos.x >= cropRect.x && mousePos.x <= cropRect.x + cropRect.w &&
                            mousePos.y >= cropRect.y && mousePos.y <= cropRect.y + cropRect.h) {
                            cropDragMode = 'move';
                            isInteracting = true;
                            cropStart = { ...mousePos };
                            return;
                        }
                    }
                    
                    cropRect = null;
                    cropDragMode = 'draw';
                    isInteracting = true;
                    cropStart = { ...mousePos };
                    updateCropControls();
                } else {
                    isInteracting = true;
                    hasModifiedInCurrentStroke = false;
                    if (mode === 'erase') performErase();
                }

                renderUI();
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!currentImage) return;

            if (isPanning) {
                const dx = e.clientX - panStart.x;
                const dy = e.clientY - panStart.y;
                panX += dx;
                panY += dy;
                updateZoom();
                panStart = { x: e.clientX, y: e.clientY };
                return;
            }

            if (container.contains(e.target) || isInteracting) {
                mousePos = getMousePos(e);
                
                if (mode === 'crop' && !isInteracting && cropRect) {
                    const hs = 12 / currentScale;
                    const handles = getCropHandles(cropRect);
                    let hoveringHandle = false;
                    for (let key in handles) {
                        const p = handles[key];
                        if (Math.abs(mousePos.x - p.x) <= hs && Math.abs(mousePos.y - p.y) <= hs) {
                            if (key === 'nw' || key === 'se') container.style.cursor = 'nwse-resize';
                            else if (key === 'ne' || key === 'sw') container.style.cursor = 'nesw-resize';
                            else if (key === 'n' || key === 's') container.style.cursor = 'ns-resize';
                            else if (key === 'e' || key === 'w') container.style.cursor = 'ew-resize';
                            hoveringHandle = true;
                            break;
                        }
                    }
                    if (!hoveringHandle) {
                        if (mousePos.x >= cropRect.x && mousePos.x <= cropRect.x + cropRect.w &&
                            mousePos.y >= cropRect.y && mousePos.y <= cropRect.y + cropRect.h) {
                            container.style.cursor = 'move';
                        } else {
                            container.style.cursor = 'crosshair';
                        }
                    }
                }

                if (mode === 'crop' && isInteracting) {
                    if (cropDragMode === 'draw') {
                        // Drawing handled by renderUI
                    } else if (cropDragMode === 'move') {
                        const dx = mousePos.x - cropStart.x;
                        const dy = mousePos.y - cropStart.y;
                        cropRect.x += dx;
                        cropRect.y += dy;
                        cropStart = { ...mousePos };
                    } else if (cropDragMode) {
                        const dx = mousePos.x - cropStart.x;
                        const dy = mousePos.y - cropStart.y;
                        
                        if (cropDragMode.includes('w')) { cropRect.x += dx; cropRect.w -= dx; }
                        if (cropDragMode.includes('e')) { cropRect.w += dx; }
                        if (cropDragMode.includes('n')) { cropRect.y += dy; cropRect.h -= dy; }
                        if (cropDragMode.includes('s')) { cropRect.h += dy; }
                        
                        if (cropRect.w < 0) {
                            cropRect.x += cropRect.w;
                            cropRect.w = Math.abs(cropRect.w);
                            cropDragMode = cropDragMode.replace('w', 'temp').replace('e', 'w').replace('temp', 'e');
                        }
                        if (cropRect.h < 0) {
                            cropRect.y += cropRect.h;
                            cropRect.h = Math.abs(cropRect.h);
                            cropDragMode = cropDragMode.replace('n', 'temp').replace('s', 'n').replace('temp', 's');
                        }
                        cropStart = { ...mousePos };
                    }
                } else if (mode === 'erase' && isInteracting) {
                    performErase();
                }
                updateBrushCursor();
                renderUI();
            } else {
                brushCursor.style.display = 'none';
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (isPanning) {
                isPanning = false;
                updateCursor();
                updateBrushCursor();
                return;
            }

            if (isInteracting) {
                if (mode === 'crop') {
                    if (cropDragMode === 'draw') {
                        const minX = Math.min(cropStart.x, mousePos.x);
                        const minY = Math.min(cropStart.y, mousePos.y);
                        const width = Math.abs(mousePos.x - cropStart.x);
                        const height = Math.abs(mousePos.y - cropStart.y);
                        if (width > 0 && height > 0) {
                            cropRect = { x: minX, y: minY, w: width, h: height };
                        }
                    }
                    cropDragMode = null;
                    updateCropControls();
                } else if (mode === 'erase' && hasModifiedInCurrentStroke) {
                    saveState();
                }

                isInteracting = false;
                hasModifiedInCurrentStroke = false;
                
                if (e.target !== uiCanvas && mode !== 'crop') {
                    uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
                } else {
                    renderUI();
                }
            }
        });

        uiCanvas.addEventListener('mouseleave', () => {
            if (!isInteracting) {
                if (mode !== 'crop') {
                    uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
                } else {
                    renderUI();
                }
            }
        });

        container.addEventListener('mouseleave', () => {
            if (!isInteracting) {
                brushCursor.style.display = 'none';
            }
        });

        // --- UI & ZOOM UPDATES ---
        eraserSizeSlider.addEventListener('input', (e) => {
            sizeVal.textContent = e.target.value;
            updateBrushCursor();
            renderUI();
        });

        function updateZoom() {
            canvasWrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${currentScale})`;
            updateBrushCursor();
        }

        function zoom(amount) {
            const prevScale = currentScale;
            currentScale = Math.max(0.5, currentScale + amount);
            
            const centerX = container.clientWidth / 2;
            const centerY = container.clientHeight / 2;
            
            const canvasX = (centerX - panX) / prevScale;
            const canvasY = (centerY - panY) / prevScale;
            
            panX = centerX - canvasX * currentScale;
            panY = centerY - canvasY * currentScale;
            
            updateZoom();
        }

        document.getElementById('toggleBgBtn').addEventListener('click', () => {
            container.classList.toggle('dark-bg');
        });

        document.getElementById('zoomIn').addEventListener('click', () => { zoom(0.5); });
        document.getElementById('zoomOut').addEventListener('click', () => { zoom(-0.5); });
        document.getElementById('resetZoom').addEventListener('click', () => { 
            currentScale = 1; 
            centerCanvas(); 
        });

        document.getElementById('autoProcessBtn').addEventListener('click', () => {
            if (!currentImage) return;

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const w = canvas.width;
            const h = canvas.height;

            function isBg(x, y) {
                const i = (y * w + x) * 4;
                const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
                if (a === 0) return true;
                if (r > 240 && g > 240 && b > 240) return true;
                return false;
            }

            const visited = new Uint8Array(w * h);
            const queue = [];

            // Add border pixels to queue
            for (let x = 0; x < w; x++) {
                if (isBg(x, 0)) { queue.push(x); visited[x] = 1; }
                if (isBg(x, h - 1)) { queue.push((h - 1) * w + x); visited[(h - 1) * w + x] = 1; }
            }
            for (let y = 1; y < h - 1; y++) {
                if (isBg(0, y)) { queue.push(y * w); visited[y * w] = 1; }
                if (isBg(w - 1, y)) { queue.push(y * w + w - 1); visited[y * w + w - 1] = 1; }
            }

            // Flood fill
            let head = 0;
            while (head < queue.length) {
                const idx = queue[head++];
                const x = idx % w;
                const y = Math.floor(idx / w);

                const i = idx * 4;
                data[i] = 0; data[i+1] = 0; data[i+2] = 0; data[i+3] = 0;

                if (x + 1 < w) {
                    const nIdx = idx + 1;
                    if (!visited[nIdx] && isBg(x + 1, y)) { visited[nIdx] = 1; queue.push(nIdx); }
                }
                if (x - 1 >= 0) {
                    const nIdx = idx - 1;
                    if (!visited[nIdx] && isBg(x - 1, y)) { visited[nIdx] = 1; queue.push(nIdx); }
                }
                if (y + 1 < h) {
                    const nIdx = idx + w;
                    if (!visited[nIdx] && isBg(x, y + 1)) { visited[nIdx] = 1; queue.push(nIdx); }
                }
                if (y - 1 >= 0) {
                    const nIdx = idx - w;
                    if (!visited[nIdx] && isBg(x, y - 1)) { visited[nIdx] = 1; queue.push(nIdx); }
                }
            }

            // Bounding box of remaining object
            let minX = w, minY = h, maxX = -1, maxY = -1;
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const a = data[(y * w + x) * 4 + 3];
                    if (a > 0) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
            }

            if (maxX === -1) {
                ctx.putImageData(imgData, 0, 0);
            } else {
                const newW = maxX - minX + 1;
                const newH = maxY - minY + 1;
                
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = newW;
                tempCanvas.height = newH;
                const tempCtx = tempCanvas.getContext('2d');
                
                ctx.putImageData(imgData, 0, 0);
                tempCtx.drawImage(canvas, minX, minY, newW, newH, 0, 0, newW, newH);
                
                setCanvasSize(newW, newH);
                ctx.drawImage(tempCanvas, 0, 0);
                centerCanvas();
                updateBrushCursor();
            }
            
            saveState();
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (!currentImage) {
                alert("Please upload an image first!");
                return;
            }
            const link = document.createElement('a');
            link.download = 'cleaned_sprite.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
